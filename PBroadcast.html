<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端網路廣播工作台</title>
    <!-- 引入外部 QR Code 產生庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #1db954;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 2fr 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* 拖曳區域 */
        #drop-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        #drop-zone.hover {
            border-color: var(--accent-color);
            background-color: rgba(29, 185, 84, 0.1);
            color: #fff;
        }

        /* 播放器樣式 */
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #now-playing {
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            color: var(--accent-color);
            min-height: 27px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        /* 播放清單 */
        .playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #282828;
            cursor: move;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background-color: #282828;
        }

        .playlist-item.playing {
            color: var(--accent-color);
            background-color: rgba(29, 185, 84, 0.05);
        }

        .item-title {
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }

        .btn-del {
            background: none;
            border: none;
            color: #ff5555;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* QR Code 區塊 */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: inline-block;
        }

        .share-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px; font-weight: 300;">📡 BROADCAST STATION</h1>

    <div class="container">
        <!-- 左側：主控制台與排程區 -->
        <div class="main-panel">
            <!-- 播放器核心 -->
            <div class="card" style="margin-bottom: 20px;">
                <h2>正在播音</h2>
                <div class="player-controls">
                    <div id="now-playing">尚未裝載節目音檔</div>
                    <audio id="audio-player" controls></audio>
                </div>
            </div>

            <!-- 拖曳與節目編排 -->
            <div class="card">
                <h2>節目排程管理</h2>
                <div id="drop-zone">
                    🎵 拖曳音樂檔案 (MP3/WAV) 至此處，或點擊選擇檔案
                    <input type="file" id="file-input" multiple accept="audio/*" style="display: none;">
                </div>
                <ul class="playlist" id="playlist-container">
                    <!-- 動態插入曲目 -->
                </ul>
            </div>
        </div>

        <!-- 右側：收聽與分享（QR Code） -->
        <div class="sidebar">
            <div class="card qr-section">
                <h2>掃碼收聽廣播</h2>
                <div id="qrcode"></div>
                <div class="share-hint">
                    <strong>觀眾收聽指南：</strong><br>
                    此 QR Code 內含當前播放節目的線上收聽資訊。在中大型播音環境中，可將此網頁部署至伺服器（如 GitHub Pages），聽眾掃碼即可即時同步收聽您的音訊串流。
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const playlistContainer = document.getElementById('playlist-container');
        const audioPlayer = document.getElementById('audio-player');
        const nowPlayingDiv = document.getElementById('now-playing');
        const qrContainer = document.getElementById('qrcode');

        let playlist = [];
        let currentTrackIndex = -1;
        let qrcode = new QRCode(qrContainer, { width: 180, height: 180 });

        // 初始化 QR Code (預設指向當前網址)
        updateQRCode(window.location.href);

        // --- 事件監聽：點擊與拖曳上傳 ---
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('hover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            handleFiles(e.dataTransfer.files);
        });

        // 處理上傳的音檔
        function handleFiles(files) {
            for (let file of files) {
                if (file.type.startsWith('audio/')) {
                    const track = {
                        id: Date.now() + Math.random().toString(36).substr(2, 5),
                        name: file.name,
                        file: file, // 記憶體中的 Blob 物件
                        url: URL.createObjectURL(file)
                    };
                    playlist.push(track);
                }
            }
            renderPlaylist();
            if (currentTrackIndex === -1 && playlist.length > 0) {
                playTrack(0);
            }
        }

        // --- 渲染播放清單 UI ---
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = `playlist-item ${index === currentTrackIndex ? 'playing' : ''}`;
                li.setAttribute('draggable', 'true');
                li.dataset.index = index;

                li.innerHTML = `
                    <span class="item-title">${index + 1}. ${track.name}</span>
                    <button class="btn-del" onclick="deleteTrack(${index}, event)">刪除</button>
                `;

                // 點擊曲目切換播放
                li.addEventListener('click', () => playTrack(index));
                
                // 拖曳排序事件 (HTML5 Drag and Drop)
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('drop', handleDragDrop);

                playlistContainer.appendChild(li);
            });
        }

        // --- 播放控制核心 ---
        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentTrackIndex = index;
            const track = playlist[index];
            
            audioPlayer.src = track.url;
            nowPlayingDiv.innerText = `📻 正在撥放：${track.name}`;
            
            // 更新 QR Code：將當前歌曲名稱編碼進去（可結合外部點歌或異地監聽系統）
            const shareUrl = `${window.location.origin}${window.location.pathname}?track=${encodeURIComponent(track.name)}`;
            updateQRCode(shareUrl);

            renderPlaylist();
            audioPlayer.play().catch(err => console.log("自動播放受瀏覽器安全限制，需手動點擊播放"));
        }

        // 自動播放下一首
        audioPlayer.addEventListener('ended', () => {
            if (currentTrackIndex + 1 < playlist.length) {
                playTrack(currentTrackIndex + 1);
            } else {
                nowPlayingDiv.innerText = "🛑 節目播放完畢";
                currentTrackIndex = -1;
                renderPlaylist();
            }
        });

        // 刪除曲目
        window.deleteTrack = function(index, event) {
            event.stopPropagation(); // 防止觸發播放事件
            
            // 釋放記憶體
            URL.revokeObjectURL(playlist[index].url);
            
            playlist.splice(index, 1);
            
            if (index === currentTrackIndex) {
                audioPlayer.src = '';
                nowPlayingDiv.innerText = "尚未裝載節目音檔";
                currentTrackIndex = -1;
            } else if (index < currentTrackIndex) {
                currentTrackIndex--;
            }
            
            renderPlaylist();
        };

        // --- 拖曳排序邏輯 (Drag & Drop) ---
        let dragSourceIndex = null;

        function handleDragStart(e) {
            dragSourceIndex = this.dataset.index;
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDragDrop(e) {
            e.preventDefault();
            const targetIndex = this.dataset.index;
            if (dragSourceIndex === null || dragSourceIndex === targetIndex) return;

            // 陣列元素位置調換
            const movedItem = playlist.splice(dragSourceIndex, 1)[0];
            playlist.splice(targetIndex, 0, movedItem);

            // 修正當前播放指標
            if (currentTrackIndex == dragSourceIndex) {
                currentTrackIndex = targetIndex;
            } else if (currentTrackIndex > dragSourceIndex && currentTrackIndex <= targetIndex) {
                currentTrackIndex--;
            } else if (currentTrackIndex < dragSourceIndex && currentTrackIndex >= targetIndex) {
                currentTrackIndex++;
            }

            renderPlaylist();
        }

        // --- 更新 QR Code ---
        function updateQRCode(text) {
            qrcode.clear();
            qrcode.makeCode(text);
        }
    </script>
</body>
</html>
